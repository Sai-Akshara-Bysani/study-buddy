<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Buddy 🐸</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── STUDY PET (fixed corner overlay) ── -->
  <div id="pet-container">
    <div id="pet" title="Your study buddy!">
      <div class="pet-body">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
      </div>
      <div class="pet-legs">
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>
    </div>
    <div id="pet-speech" class="hidden">Let's study! 📚</div>
  </div>

  <!-- ── MAIN APP ── -->
  <div class="app">
    <header>
      <h1>🐸 Study Buddy</h1>
      <p class="subtitle">Focus together, anywhere.</p>
    </header>

    <!-- Room Panel -->
    <section class="card" id="room-card">
      <h2>Study Room</h2>
      <div id="join-form">
        <input id="username-input" type="text" placeholder="Your name" maxlength="20" />
        <div style="margin-top:8px;">
          <input id="avatar-input" type="text" placeholder="Avatar image URL (optional — make one on picrew.me!)" />
          <p class="hint" style="margin-top:4px;">
            Make a character on <a href="https://picrew.me" target="_blank" style="color:var(--accent)">picrew.me</a>, save it, then right-click → Copy image address and paste above.
          </p>
        </div>
        <div class="room-row" style="margin-top:8px;">
          <input id="room-input" type="text" placeholder="Room code (e.g. frog42)" maxlength="12" />
          <button id="join-btn">Join / Create</button>
        </div>
        <p class="hint">Share the room code with friends so they can join you!</p>
      </div>
      <div id="room-status" class="hidden">
        <div class="room-header">
          <span id="room-name-display"></span>
          <button id="leave-btn" class="small">Leave</button>
        </div>
        <div id="friends-list"></div>
        <div id="study-table-wrap" style="margin-top:16px; border-radius:12px; overflow:hidden; border:1px solid var(--border);">
          <canvas id="table-canvas" style="display:block; width:100%; background:var(--surface2);"></canvas>
        </div>
      </div>
    </section>

    <!-- Timer Panel -->
    <section class="card" id="timer-card">
      <h2>Pomodoro Timer</h2>
      <div class="timer-modes">
        <button class="mode-btn active" data-mode="study" data-minutes="25">Study 25m</button>
        <button class="mode-btn" data-mode="short" data-minutes="5">Break 5m</button>
        <button class="mode-btn" data-mode="long" data-minutes="15">Long break 15m</button>
      </div>
      <div id="timer-display">25:00</div>
      <div class="timer-controls">
        <button id="timer-start">▶ Start</button>
        <button id="timer-reset">↺ Reset</button>
      </div>
      <p id="timer-label" class="timer-label">Time to focus!</p>
    </section>

    <!-- Music Panel -->
    <section class="card" id="music-card">
      <h2>Lo-fi Music 🎵</h2>

      <!-- Preset tracks -->
      <div class="music-tracks">
        <button class="track-btn active" data-id="jfKfPfyJRdk">Lofi Girl ☕</button>
        <button class="track-btn" data-id="4xDzrJKXOOY">Synthwave 🌃</button>
        <button class="track-btn" data-id="lTRiuFIWV54">Jazz Hop 🎷</button>
      </div>

      <!-- Custom YT URL input -->
      <div style="display:flex; gap:8px; margin-bottom:14px;">
        <input id="yt-url-input" type="text" placeholder="Paste any YouTube URL to queue it…" style="flex:1;" />
        <button id="yt-queue-btn" class="small" style="white-space:nowrap;">＋ Add</button>
      </div>

      <!-- Synced controls (shown only in a room) -->
      <div id="music-sync-bar" class="hidden" style="
        display:flex; align-items:center; gap:10px;
        background:var(--surface2); border:1px solid var(--border);
        border-radius:8px; padding:8px 14px; margin-bottom:12px; font-size:0.82rem; color:var(--muted);">
        <span id="music-sync-label" style="flex:1">🎵 Room music</span>
        <button id="music-play-btn"  class="small">▶ Play</button>
        <button id="music-pause-btn" class="small">⏸ Pause</button>
        <button id="music-skip-btn"  class="small">⏭ Skip</button>
      </div>

      <!-- YT player (hidden div — controlled via IFrame API) -->
      <div id="yt-player-container" style="border-radius:10px; overflow:hidden; border:1px solid var(--border);">
        <div id="yt-player"></div>
      </div>

      <!-- Queue list -->
      <div id="music-queue" style="margin-top:12px; display:flex; flex-direction:column; gap:6px;"></div>
    </section>

  </div><!-- /.app -->

  <!-- ── SCRIPTS ── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- YouTube IFrame API — calls window.onYouTubeIframeAPIReady when ready -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="pet.js"></script>
  <script src="timer.js"></script>
  <script src="multiplayer.js"></script>
  <script src="music.js"></script>
  <script src="table.js"></script>

</body>
</html>
