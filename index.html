<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blookle</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="pet-container">
    <div id="pet" title="Your study buddy!">
      <div class="pet-body">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
      </div>
      <div class="pet-legs">
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>
    </div>
    <div id="pet-speech" class="hidden">Let's study! 📚</div>
  </div>

  <div id="lobby-screen" class="lobby-container">
    <div class="lobby-card">
      <div class="brand-logo-container" aria-label="Blookle">
        <img src="images/b.png" alt="B" class="logo-letter letter-b" />
        <img src="images/l1.png" alt="l" class="logo-letter letter-l1" />
        <img id="drag-button-target" src="images/o1.png" alt="o" class="logo-letter letter-o1 draggable-button" ondragstart="return false;" />
        <img src="images/o2.png" alt="o" class="logo-letter letter-o2" />
        <img src="images/k.png" alt="k" class="logo-letter letter-k" />
        <img src="images/l2.png" alt="l" class="logo-letter letter-l2" />
        <img src="images/e.png" alt="e" class="logo-letter letter-e" />
      </div>
    
      <p class="subtitle">Join a room. Call a friend. Study and jam.</p>

      <div class="input-group">
        <input id="username-input" type="text" placeholder="Your name" maxlength="20" />
      </div>

      <div class="input-group">
        <input id="room-input" type="text" placeholder="Room code (e.g. frog42)" maxlength="12" />
      </div>

      <div class="input-group">
        <input id="avatar-input" type="text" placeholder="Avatar image URL" />
        <p class="hint">
          Make a character on <a href="https://picrew.me/en/image_maker/1908798" target="_blank">heree</a>, right-click → Copy image address and paste here.
        </p>
      </div>

      <button id="join-btn" class="primary-btn">Enter Room</button>
    </div>
  </div>

  <div class="app hidden" id="main-app-content">
    
    <div id="canvas-workspace">
      <div id="study-table-wrap">
        <canvas id="table-canvas"></canvas>
      </div>
    </div>

    <div class="widget-column left-widgets">
      <section class="card widget-card" id="room-card">
        <div class="room-header">
          <span id="room-name-display"></span>
          <button id="leave-btn" class="small">Leave</button>
        </div>
        <div id="friends-list"></div>
      </section>

      <section class="card widget-card" id="timer-card">
        <h2>Pomodoro</h2>
        <div class="timer-modes">
          <button class="mode-btn active" data-mode="study" data-minutes="25">Focus 25m</button>
          <button class="mode-btn" data-mode="short" data-minutes="5">Break 5m</button>
        </div>
        <div id="timer-display">25:00</div>
        <div class="timer-controls">
          <button id="timer-start">▶ Start</button>
          <button id="timer-reset">↺ Reset</button>
        </div>
      </section>
    </div>

    <div class="widget-column right-widgets">
      <section class="card widget-card" id="music-card">
        <h2>Lo-fi Music 🎵</h2>
        <div class="music-tracks">
          <button class="track-btn active" data-id="jfKfPfyJRdk">☕ Lofi</button>
          <button class="track-btn" data-id="4xDzrJKXOOY">Lighting 🌃</button>
          <button class="track-btn" data-id="lTRiuFIWV54">Jazz 🎷</button>
        </div>

        <div style="display:flex; gap:6px; margin-bottom:10px;">
          <input id="yt-url-input" type="text" placeholder="Paste YouTube link..." style="flex:1; font-size: 13px;" />
          <button id="yt-queue-btn" class="small" style="white-space:nowrap;">＋ Add</button>
        </div>

        <div id="music-sync-bar" class="hidden">
          <span id="music-sync-label">🎵 Room track</span>
          <button id="music-play-btn"  class="small">▶</button>
          <button id="music-pause-btn" class="small">⏸</button>
          <button id="music-skip-btn"  class="small">⏭</button>
        </div>

        <div id="yt-player-container">
          <div id="yt-player"></div>
        </div>
        <div id="music-queue"></div>
      </section>
    </div>

  </div>

  <div id="scrapbook-decorations">
    <img src="images/left-stickers.png" class="sticker-group left-group" alt="Left side scrapbook stickers" />
    <img src="images/right-stickers.png" class="sticker-group right-group" alt="Right side scrapbook stickers" />
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="pet.js"></script>
  <script src="timer.js"></script>
  <script src="multiplayer.js"></script>
  <script src="music.js"></script>
  <script src="table.js"></script>

  <script>
    (function() {
      const button = document.getElementById("drag-button-target");
      if (!button) return;

      let isDragging = false;
      let startX, startY;
      let currentX = 0;
      let currentY = 0;

      button.addEventListener("pointerdown", function(e) {
          isDragging = true;
          button.setPointerCapture(e.pointerId);
          startX = e.clientX - currentX;
          startY = e.clientY - currentY;
      });

      button.addEventListener("pointermove", function(e) {
          if (!isDragging) return;
          currentX = e.clientX - startX;
          currentY = e.clientY - startY;
          button.style.setProperty('--drag-x', currentX + 'px');
          button.style.setProperty('--drag-y', currentY + 'px');
      });

      function stopDrag(e) {
          if (isDragging) {
              isDragging = false;
              button.releasePointerCapture(e.pointerId);
          }
      }
      button.addEventListener("pointerup", stopDrag);
      button.addEventListener("pointercancel", stopDrag);
    })();
  </script>

</body>
</html>
